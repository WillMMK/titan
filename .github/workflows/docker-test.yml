name: Docker Build and Test

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f services/titan-worker/Dockerfile.titan-worker -t titan-worker-test .
      - name: Run DRY_RUN test
        run: docker run --rm -e DRY_RUN=1 titan-worker-test 